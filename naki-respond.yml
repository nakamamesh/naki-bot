# Naki AI Mascot - Respond to comments (1x daily to conserve Twitter read quota)
# Free tier: 100 read requests/month - run sparingly
name: Naki Respond

on:
  schedule:
    - cron: '30 12 * * *'  # Once daily at 12:30 UTC
  workflow_dispatch:

jobs:
  respond:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: naki-bot
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore replied IDs cache
        uses: actions/cache@v4
        with:
          path: naki-bot/.replied_comments.json
          key: naki-replied-ids

      - name: Create .env
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "TWITTER_API_KEY=${{ secrets.TWITTER_API_KEY }}" >> .env
          echo "TWITTER_API_SECRET=${{ secrets.TWITTER_API_SECRET }}" >> .env
          echo "TWITTER_ACCESS_TOKEN=${{ secrets.TWITTER_ACCESS_TOKEN }}" >> .env
          echo "TWITTER_ACCESS_TOKEN_SECRET=${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}" >> .env

      - name: Respond to comments
        run: python respond_to_comments.py
